services:
  # Web service (Symfony app)
  - type: web
    name: portfolio-symfony
    runtime: docker
    plan: starter
    region: frankfurt  # ou oregon/singapore selon votre localisation
    branch: main
    dockerfilePath: ./Dockerfile
    
    envVars:
      - key: APP_ENV
        value: prod
      - key: APP_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: CORS_ALLOW_ORIGIN
        value: ^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$
    
    # Mount persistent disk for uploads
    disk:
      name: uploads
      mountPath: /app/public/uploads
      sizeGB: 1
    
    # Health check endpoint
    healthCheckPath: /

# PostgreSQL database
databases:
  - name: portfolio-db
    plan: starter
    region: frankfurt
    databaseName: portfolio
    user: portfolio_user
